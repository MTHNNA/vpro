services:
  vidzilla-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: vidzilla-bot:latest
    container_name: vidzilla-bot
    working_dir: /app
    environment:
      BOT_TOKEN: ${BOT_TOKEN:-}
      BOT_MODE: ${BOT_MODE:-polling}
      PORT: ${PORT:-7860}
      HOST: ${HOST:-0.0.0.0}
      WEBHOOK_PATH: ${WEBHOOK_PATH:-}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      MONGODB_URI: ${MONGODB_URI:-}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-vidzilla}
      MONGODB_USERS_COLLECTION: ${MONGODB_USERS_COLLECTION:-users}
      ADMIN_IDS: ${ADMIN_IDS:-}
    ports:
      - "${PORT:-7860}:${PORT:-7860}"
    restart: unless-stopped
